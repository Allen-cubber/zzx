<!-- 视图切换功能脚本 -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const viewToggleButton = document.getElementById('view-toggle-button');
        const viewOptions = document.getElementById('view-options');
        const postList = document.getElementById('post-list');
        const sortFieldSelect = document.getElementById('sort-field');
        const sortDirectionSelect = document.getElementById('sort-direction');
        const sectionFilterSelect = document.getElementById('section-filter');
        const recentFilterButtons = Array.from(document.querySelectorAll('.recent-filter-btn'));

        if (!viewToggleButton || !viewOptions || !postList) {
            return;
        }

        // 切换下拉菜单的显示/隐藏
        viewToggleButton.addEventListener('click', function(event) {
            event.stopPropagation();
            viewOptions.classList.toggle('show');
        });

        // 点击选项切换视图
        viewOptions.addEventListener('click', function(event) {
            const target = event.target.closest('li');
            if (target && target.dataset.view) {
                const newView = target.dataset.view;
                setView(newView);
                viewOptions.classList.remove('show');
            }
        });

        // 点击页面其他地方隐藏菜单
        document.addEventListener('click', function() {
            if (viewOptions.classList.contains('show')) {
                viewOptions.classList.remove('show');
            }
        });

        // 设置视图的函数
// layouts/partials/extend_footer.html (脚本部分)

        function setView(view) {
            // 更新列表的 class
            postList.classList.remove('view-grid', 'view-list');
            postList.classList.add('view-' + view);

            // 更新主按钮上的图标
            const gridIcon = document.querySelector('.view-button .icon-grid');
            const listIcon = document.querySelector('.view-button .icon-list');
            if (view === 'grid') {
                gridIcon.classList.add('active');
                listIcon.classList.remove('active');
            } else {
                gridIcon.classList.remove('active');
                listIcon.classList.add('active');
            }

            // 保存用户的选择
            localStorage.setItem('preferred-view', view);
        }

        // 页面加载时，应用保存的视图偏好
        const savedView = localStorage.getItem('preferred-view');
        if (savedView) {
            setView(savedView);
        } else {
            setView('grid'); // 默认设置为卡片视图
        }

        // 仅在“最近更新”页启用排序（页面上存在排序控件时）。
        if (sortFieldSelect && sortDirectionSelect) {
            const sortStorageKey = 'updates-sort-preference';

            function applySort(field, direction) {
                const cards = Array.from(postList.querySelectorAll('.archive-card'));
                const dir = direction === 'asc' ? 1 : -1;

                cards.sort(function(a, b) {
                    const aValue = Number(a.dataset[field]) || 0;
                    const bValue = Number(b.dataset[field]) || 0;

                    if (aValue === bValue) {
                        return 0;
                    }
                    return (aValue - bValue) * dir;
                });

                const fragment = document.createDocumentFragment();
                cards.forEach(function(card) {
                    fragment.appendChild(card);
                });
                postList.appendChild(fragment);
            }

            function saveSortPreference(field, direction) {
                localStorage.setItem(
                    sortStorageKey,
                    JSON.stringify({ field: field, direction: direction, days: state.days, section: state.section })
                );
            }

            function getSortPreference() {
                const saved = localStorage.getItem(sortStorageKey);
                if (!saved) {
                    return { field: 'lastmod', direction: 'desc', days: 'all', section: 'all' };
                }

                try {
                    const parsed = JSON.parse(saved);
                    const field = parsed.field === 'date' ? 'date' : 'lastmod';
                    const direction = parsed.direction === 'asc' ? 'asc' : 'desc';
                    const days = normalizeDays(parsed.days);
                    const section = normalizeSection(parsed.section);
                    return { field: field, direction: direction, days: days, section: section };
                } catch (error) {
                    return { field: 'lastmod', direction: 'desc', days: 'all', section: 'all' };
                }
            }

            function normalizeDays(value) {
                if (value === '7' || value === '30' || value === '90') {
                    return value;
                }
                return 'all';
            }

            function normalizeSection(value) {
                if (!sectionFilterSelect || value === 'all') {
                    return 'all';
                }

                const exists = Array.from(sectionFilterSelect.options).some(function(option) {
                    return option.value === value;
                });
                return exists ? value : 'all';
            }

            function setRecentFilterUI(days) {
                recentFilterButtons.forEach(function(button) {
                    const active = button.dataset.days === days;
                    button.classList.toggle('active', active);
                    button.setAttribute('aria-pressed', active ? 'true' : 'false');
                });
            }

            function applyFilters(field, days, section) {
                const cards = Array.from(postList.querySelectorAll('.archive-card'));
                const threshold = Math.floor(Date.now() / 1000) - Number(days) * 86400;

                cards.forEach(function(card) {
                    const value = Number(card.dataset[field]) || 0;
                    const sectionMatch = section === 'all' || card.dataset.section === section;
                    const dayMatch = days === 'all' || value >= threshold;
                    card.style.display = sectionMatch && dayMatch ? '' : 'none';
                });
            }

            function applyUpdatesViewState() {
                applySort(state.field, state.direction);
                applyFilters(state.field, state.days, state.section);
                setRecentFilterUI(state.days);
                if (sectionFilterSelect) {
                    sectionFilterSelect.value = state.section;
                }
            }

            function onSortChange() {
                state.field = sortFieldSelect.value;
                state.direction = sortDirectionSelect.value;
                applyUpdatesViewState();
                saveSortPreference(state.field, state.direction);
            }

            const initial = getSortPreference();
            const state = {
                field: initial.field,
                direction: initial.direction,
                days: initial.days,
                section: initial.section
            };

            sortFieldSelect.value = state.field;
            sortDirectionSelect.value = state.direction;
            applyUpdatesViewState();

            sortFieldSelect.addEventListener('change', onSortChange);
            sortDirectionSelect.addEventListener('change', onSortChange);

            if (sectionFilterSelect) {
                sectionFilterSelect.addEventListener('change', function() {
                    state.section = normalizeSection(sectionFilterSelect.value);
                    applyUpdatesViewState();
                    saveSortPreference(state.field, state.direction);
                });
            }

            recentFilterButtons.forEach(function(button) {
                button.addEventListener('click', function() {
                    state.days = normalizeDays(button.dataset.days);
                    applyUpdatesViewState();
                    saveSortPreference(state.field, state.direction);
                });
            });
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>

<!-- 我们的搜索逻辑脚本 -->
<script>
    // 只在搜索页面执行这段脚本
    if (document.getElementById('search-input')) {
        
        console.log("Search script loading...");

        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        
        // 1. 加载 JSON 索引文件
        fetch('/index.json')
            .then(response => response.json())
            .then(data => {
                console.log("JSON index loaded:", data.length, "pages");
                
                const fuseOptions = {
                    isCaseSensitive: false,
                    includeScore: true,
                    shouldSort: true,
                    threshold: 0.4,
                    minMatchCharLength: 2,
                    keys: ['title', 'summary', 'content', 'tags']
                };

                const fuse = new Fuse(data, fuseOptions);

                // 2. 监听输入框的变化
                searchInput.addEventListener('input', function (e) {
                    const query = e.target.value;
                    if (query.length < 2) {
                        searchResults.innerHTML = '';
                        return;
                    }
                    const results = fuse.search(query);
                    displayResults(results);
                });

            })
            .catch(error => {
                console.error("Error loading search index:", error);
                searchResults.innerHTML = '<p>无法加载搜索索引，请稍后重试。</p>';
            });

        // 3. 显示结果的函数
        function displayResults(results) {
            searchResults.innerHTML = ''; // 清空旧结果
            
            if (results.length === 0) {
                searchResults.innerHTML = '<p>没有找到相关内容。</p>';
                return;
            }

            results.slice(0, 20).forEach(result => { // 最多显示前20条结果
                const item = result.item;
                const resultItem = document.createElement('article');
                resultItem.classList.add('search-result-item');
                
                let summary = item.summary || item.content.substring(0, 150) + '...';

                resultItem.innerHTML = `
                    <h3><a href="${item.permalink}">${item.title}</a></h3>
                    <p>${summary}</p>
                `;
                searchResults.appendChild(resultItem);
            });
        }
    }
</script>
