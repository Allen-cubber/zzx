{{- define "main" }}
{{- $travelData := site.Data.travel | default dict -}}

<section class="travel-page" data-travel-page>
  <script id="travel-seed" type="application/json">{{ $travelData | jsonify | safeJS }}</script>

  <header class="travel-toolbar" aria-label="旅行地图">
    <div class="travel-title-block">
      <h1>{{ .Title }}</h1>
    </div>

    <div class="travel-toolbar-actions">
      <div class="travel-stats" aria-label="旅行统计">
        <span><strong data-travel-count>0</strong> 城市</span>
        <span><strong data-travel-country-count>0</strong> 地区</span>
      </div>
    </div>
  </header>

  <div class="travel-workspace">
    <section class="travel-map-panel" aria-label="中国旅行地图">
      <div class="travel-map-topbar">
        <div class="travel-layer-switch" role="group" aria-label="地图图层">
          <button type="button" data-travel-layer="standard">标准</button>
          <button type="button" class="is-active" data-travel-layer="satellite">卫星</button>
        </div>
        <div class="travel-icon-row">
          <button type="button" class="travel-icon-btn" title="缩小" aria-label="缩小地图" data-travel-zoom-out>
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M5 12h14"></path></svg>
          </button>
          <button type="button" class="travel-icon-btn" title="放大" aria-label="放大地图" data-travel-zoom-in>
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
          </button>
          <button type="button" class="travel-icon-btn" title="复位" aria-label="复位地图" data-travel-map-reset>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M3 12a9 9 0 1 0 3-6.7"></path>
              <path d="M3 3v6h6"></path>
            </svg>
          </button>
          <button type="button" class="travel-icon-btn" title="全屏" aria-label="全屏显示地图" data-travel-fullscreen>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 3H3v5"></path>
              <path d="M16 3h5v5"></path>
              <path d="M21 16v5h-5"></path>
              <path d="M8 21H3v-5"></path>
            </svg>
          </button>
        </div>
        <button type="button" class="travel-back-btn" data-travel-back hidden>
          返回
        </button>
      </div>

      <div class="travel-map-viewport" id="travel-map" data-travel-map></div>
      <article class="travel-place-card" data-travel-place-card aria-live="polite"></article>
    </section>

    <aside class="travel-sidebar" data-travel-sidebar aria-label="旅行时间线">
      <div class="travel-sidebar-head">
        <div>
          <p class="travel-kicker">Timeline</p>
          <h2>时间线</h2>
        </div>
        <button type="button" class="travel-icon-btn" title="收起侧边栏" aria-label="收起侧边栏" data-travel-sidebar-toggle>
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 6-6 6 6 6"></path></svg>
        </button>
      </div>
      <div class="travel-photo-strip" data-travel-photo-strip></div>
      <div class="travel-timeline" data-travel-timeline></div>
    </aside>
  </div>

  <div class="travel-detail-overlay" data-travel-detail hidden>
    <article class="travel-detail-panel" role="dialog" aria-modal="true" aria-label="旅行详情">
      <header class="travel-detail-head">
        <div>
          <p data-travel-detail-meta></p>
          <h2 data-travel-detail-title></h2>
        </div>
        <button type="button" class="travel-icon-btn" title="关闭" aria-label="关闭详情" data-travel-detail-close>
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        </button>
      </header>
      <div class="travel-detail-media" data-travel-detail-media></div>
      <div class="travel-detail-story" data-travel-detail-story></div>
    </article>
  </div>

  <div class="travel-lightbox" data-travel-lightbox hidden>
    <button type="button" class="travel-lightbox-close" title="关闭" aria-label="关闭图片" data-travel-lightbox-close>
      <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
    </button>
    <button type="button" class="travel-lightbox-nav travel-lightbox-prev" title="上一张" aria-label="上一张" data-travel-lightbox-prev>
      <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 6-6 6 6 6"></path></svg>
    </button>
    <figure>
      <img data-travel-lightbox-image alt="">
      <figcaption data-travel-lightbox-caption></figcaption>
    </figure>
    <button type="button" class="travel-lightbox-nav travel-lightbox-next" title="下一张" aria-label="下一张" data-travel-lightbox-next>
      <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"></path></svg>
    </button>
  </div>
</section>

<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
{{- $travelJS := resources.Get "js/travel.js" | minify | fingerprint -}}
<script defer src="{{ $travelJS.RelPermalink }}" integrity="{{ $travelJS.Data.Integrity }}"></script>
{{- end }}
