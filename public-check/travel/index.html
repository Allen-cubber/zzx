","file":"微信图片_20260505203721_1266_13.jpg"},{"caption":"南航永远的神","file":"微信图片_20260505204242_1268_13.jpg"},{"caption":"准备起飞","file":"微信图片_20260505204842_1269_13.jpg"},{"caption":"快降落了","file":"微信图片_20260505203721_1263_13.jpg"}],"story":"","tags":["机场"]}],"story":"","tags":["中原","黄河","河南"]},{"accent":"#34c759","city":"晋城市","country":"中国","date":"","id":"jincheng","lat":35.491315,"lng":112.851831,"note":"家乡所在的晋东南小城，太行山和丹河把熟悉的日常留得很稳。","photo":"","photos":[],"story":"","tags":["家乡","晋东南","太行山"]},{"accent":"#ff9f0a","city":"成都市","country":"中国","date":"2023-07-09","id":"chengdu","lat":30.572815,"lng":104.066801,"note":"松弛、热闹又有烟火气，街巷里的节奏很适合慢慢走。","photo":"微信图片_20260510212703_1388_13.jpg","photos":[{"caption":"","file":"微信图片_20260510212559_1382_13.jpg"},{"caption":"","file":"微信图片_20260510212708_1391_13.jpg"},{"caption":"","file":"微信图片_20260510212118_1362_13.jpg"}],"spots":[{"accent":"#34c759","city":"都江堰","country":"成都市","date":"2023-07-10","id":"chengdu-mozsi5w4","lat":31.00321,"lng":103.609159,"note":"成都都江堰位于四川省成都市都江堰市，是战国时期秦国蜀郡太守李冰率众修建的伟大水利工程。","photo":"微信图片_20260510212116_1361_13.jpg","photos":[{"caption":"","file":"微信图片_20260510212413_1368_13.jpg"},{"caption":"","file":"微信图片_20260510212121_1365_13.jpg"},{"caption":"","file":"微信图片_20260510212122_1366_13.jpg"},{"caption":"","file":"微信图片_20260510212411_1367_13.jpg"},{"caption":"","file":"微信图片_20260510212119_1363_13.jpg"},{"caption":"","file":"微信图片_20260510212115_1360_13.jpg"},{"caption":"","file":"微信图片_20260510212112_1358_13.jpg"},{"caption":"","file":"微信图片_20260510212114_1359_13.jpg"},{"caption":"","file":"微信图片_20260510212418_1371_13.jpg"}],"story":"成都都江堰位于四川省成都市都江堰市，是战国时期秦国蜀郡太守李冰率众修建的伟大水利工程。它由鱼嘴、飞沙堰和宝瓶口三大主体工程组成，巧妙地利用自然地形和水力学原理，实现了“引水灌溉，分洪减灾”的功能，使成都平原成为“天府之国”。作为当今世界上年代最久、唯一留存且仍在使用的无坝引水工程，它被列为世界文化遗产，象征着古代中国人民卓越的智慧与治水文明。\n","tags":["历史","水利工程"]},{"accent":"#ffd60a","city":"青城山","country":"成都市","date":"2023-07-10","id":"chengdu-mozsjlrj","lat":30.908353,"lng":103.564845,"note":"那天为了赶高铁跑着下山……最终我还是赶上了哈哈","photo":"微信图片_20260510212419_1372_13.jpg","photos":[{"caption":"","file":"微信图片_20260510212416_1370_13.jpg"},{"caption":"","file":"微信图片_20260510212415_1369_13.jpg"},{"caption":"","file":"微信图片_20260510212421_1373_13.jpg"}],"story":"成都青城山位于四川省都江堰市，是中国四大道教名山之一，自古以来便以“青城天下幽”的美誉闻名遐迩。作为世界文化遗产，它不仅是道教的发祥地之一，拥有建福宫、天师洞等古迹，更因其终年青翠的山色、清幽的溪谷和深厚的文化底蕴，成为了将自然景观与宗教文化完美结合的避暑与康养胜地。\n","tags":["自然","名山","道教"]},{"accent":"#bf5af2","city":"天府广场","country":"成都市","date":"2023-07-10","id":"chengdu-mozsl7z0","lat":30.659916,"lng":104.063855,"note":"天府广场位于成都市中心，是这座城市的地理标志与核心地标。","photo":"微信图片_20260510212559_1382_13.jpg","photos":[{"caption":"","file":"微信图片_20260510212555_1380_13.jpg"},{"caption":"","file":"微信图片_20260510212551_1377_13.jpg"},{"caption":"","file":"微信图片_20260510212553_1378_13.jpg"}],"story":"天府广场位于成都市中心，是这座城市的地理标志与核心地标，也是西南地区最大的城市广场。它集政治、文化和商业功能于一体，周边环绕着四川科技馆、成都博物馆等重要建筑，地面标志性的太极八卦图设计展现了现代都市与传统文化的交融，被誉为成都的“城市会客厅”。\n","tags":["广场","城市"]},{"accent":"#ffd60a","city":"成都大熊猫繁育研究基地","country":"成都市","date":"2023-07-11","id":"chengdu-mozso3xw","lat":30.742778,"lng":104.133387,"note":"成都大熊猫繁育研究基地位于成都市北郊，是全球知名的大熊猫迁地保护基地和科研教育中心。","photo":"微信图片_20260510212559_1383_13.jpg","photos":[{"caption":"","file":"微信图片_20260510212550_1376_13.jpg"},{"caption":"","file":"微信图片_20260510212554_1379_13.jpg"},{"caption":"","file":"微信图片_20260510212556_1381_13.jpg"}],"story":"成都大熊猫繁育研究基地位于成都市北郊，是全球知名的大熊猫迁地保护基地和科研教育中心。这里模拟了大熊猫野外生存的自然环境，不仅是近距离观察大熊猫及其幼仔、小熊猫等珍稀动物的绝佳场所，更通过尖端的生物技术致力于大熊猫的繁育与保护，让更多人能领略到这些“国宝”的魅力。\n","tags":["大熊猫"]},{"accent":"#bf5af2","city":"金沙遗址","country":"成都市","date":"2023-07-11","id":"chengdu-mozsrgt8","lat":30.683674,"lng":104.011053,"note":"成都金沙遗址是位于四川省成都市的一处商周时期大型遗址，被誉为古蜀文明在继三星堆之后的又一政治、经济与文化中心。","photo":"微信图片_20260510212658_1384_13.jpg","photos":[{"caption":"遗址全景","file":"微信图片_20260510212707_1390_13.jpg"},{"caption":"黄金面具","file":"微信图片_20260510212703_1388_13.jpg"},{"caption":"太阳神鸟金饰","file":"微信图片_20260510212708_1391_13.jpg"},{"caption":"编钟","file":"微信图片_20260510212659_1385_13.jpg"},{"caption":"青铜马车","file":"微信图片_202605 ":"","tags":["青城","草原文化","内蒙古"]},{"accent":"#66d4cf","city":"清远市","country":"中国","date":"2025-09-07","id":"qingyuan","lat":23.682064,"lng":113.056031,"note":"北江山水和岭南山城气质很清爽，是从珠三角出发的放松处。","photo":"","photos":[],"story":"","tags":["北江","山水","岭南"]},{"accent":"#ffb340","city":"顺德区","country":"中国","date":"2025-11-01","id":"shunde","lat":22.80524,"lng":113.293359,"note":"食物是这里最直接的城市语言，水乡和街巷都很耐逛。有趣的地方哈哈……","photo":"微信图片_20260505150300_1165_13.jpg","photos":[],"story":"","tags":["美食","水乡","岭南"]},{"accent":"#ff6b6b","city":"东莞市","country":"中国","date":"2025-11-27","id":"dongguan","lat":23.020536,"lng":113.751765,"note":"制造业城市的密度很高，也有可慢慢展开的街区和公园。","photo":"","photos":[],"spots":[{"accent":"#ff9f0a","city":"VIVO智慧终端总部","country":"东莞市","date":"2025-11-27","id":"dongguan-mos9mm3o","lat":22.743215,"lng":113.752336,"note":"一次难忘的高科技企业参观体验。","photo":"微信图片_20260505144642_1163_13.jpg","photos":[{"caption":"校友交流会","file":"微信图片_20260505144640_1161_13.jpg"},{"caption":"","file":"微信图片_20260505144641_1162_13.jpg"},{"caption":"","file":"微信图片_20260505144648_1164_13.jpg"}],"story":"学院组织我们前往东莞的vivo“超级工厂”参观。大巴驶入vivo工业园，现代感十足的建筑群让人印象深刻。活动的第一站是文化展厅。在这里，我不仅看到了vivo从创立至今的完整发展脉络，更通过讲解员，第一次真切地理解了“本分、设计驱动、用户导向”这些核心价值观背后的分量。墙上的照片和陈列的手机，像一部浓缩的科技发展史，让我对一家成功企业的内核有了新的认识。\n但最震撼的环节，无疑是走进智能制造中心。在SMT车间，高速贴片机以令人目不暇接的速度精准作业，微小的芯片和元器件被毫厘不差地放置在线路板上。而在总装线上，机械臂有条不紊地挥舞，自动化设备进行着各种检测。现场工程师告诉我们，这里绝大部分工序都已实现自动化。亲眼见证一部手机在这样一条高度智能、安静高效的产线上诞生，我对“工业4.0”和“中国智造”有了前所未有的具象化感受，科技的“硬核”实力让人叹为观止。\n最后的晚餐是在vivo的员工餐厅，这大概是最“接地气”的交流。我们和学长、HR们围坐一桌，一边享用丰富的自助餐，一边畅所欲言。从食堂的饭菜口味聊到公司的技术挑战，从行业趋势聊到个人规划，氛围轻松又热烈。这场“餐桌上的交流会”，让我仿佛提前触摸到了职场生活的质感。\n回程的路上，我还在回味这一天的所见所闻。这不仅仅是一次简单的企业参观，更像是一扇窗户，让我亲眼看到了顶尖的制造技术，感受到了优秀的企业文化，也从学长身上看到了自己未来的可能。感谢学院组织的这次活动，它为我拨开了眼前的一些迷雾，让我对所学专业的应用和个人的职业道路，有了更清晰、更坚定的想象。\n","tags":["VIVO","手机工厂","研发中心"]}],"story":"","tags":["制造业","城市漫步"]},{"accent":"#0fb9b1","city":"湛江市","country":"中国","date":"2026-04-25","id":"zhanjiang","lat":21.270708,"lng":110.359377,"note":"南海边的海港城市，风里有很明显的热带和海盐气息。","photo":"微信图片_20260505135957_1158_13.jpg","photos":[],"spots":[{"accent":"#0fb9b1","city":"金沙湾观海长廊","country":"湛江市","date":"2026-04-25","id":"zhanjiang-jinshawan-sea-view-corridor","lat":21.2671,"lng":110.390668,"note":"第一天的海边起点，沿着金沙湾看海、看桥，也看湛江这座港城的开阔天际线。","photo":"微信图片_20260505135939_1148_13.jpg","photos":[{"caption":"湛江市奥体中心","file":"微信图片_20260505135945_1153_13.jpg"},{"caption":"湛江海湾大桥","file":"微信图片_20260505135939_1148_13.jpg"},{"caption":"金沙湾沙滩","file":"微信图片_20260505135943_1151_13.jpg"}],"story":"金沙湾观海长廊很适合作为湛江行程的开场。到了海边以后，视野一下子打开：前面是海湾，远处是湛江海湾大桥，脚下是沿岸铺开的步道和沙滩。它给人的第一印象不是某一个具体景点，而是一整片城市海岸线扑面而来。\n\n沿着长廊走的时候，可以很明显地感到湛江的城市气质：海不是背景，而是日常的一部分。有人在沙滩边散步，有人停在栏杆旁看桥，也有人只是坐在岸边吹风。金沙湾沙滩、海湾大桥和奥体中心这些画面放在一起，让这片区域既有滨海城市的开阔，也有生活场景的松弛。\n\n这里最适合慢下来，不用急着打卡到此一游。看桥的时候，桥身像一条细长的线把海湾两侧连起来；看沙滩的时候，颜色又变得柔和，海水、沙面和岸边建筑彼此过渡。照片里如果既有大桥的远景，也有沙滩和步道的近景，就能把“第一次见到湛江海边”的感觉留得比较完整。\n","tags":["观海长廊","金沙湾","海湾大桥"]},{"accent":"#34c759","city":"中澳友谊花园","country":"湛江市","date":"2026-04-25","id":"zhanjiang-china-australia-friendship-garden","lat":21.245542,"lng":110.406418,"note":"第一天的第二站，在海湾大桥西岸一带，公园、栈道和桥景把海湾视野拉得更开。","photo":"微信图片_20260505135942_1150_13.jpg","photos":[],"story":"中澳友谊花园和金沙湾离得不算远，但气质明显不一样。如果说金沙湾是城市海岸的开阔正面，那么中澳友谊花园更像海湾边一处可以停下来的缓冲地带。走进这里以后，视线会从沙滩和大桥转向园区、水面、植物和更细碎的步道。\n\n这一站的好处是节奏很松。海湾大桥仍然在视野里，但它不再只是远处的地标，而变成了公园景观的一部分。桥的线条、水面的反光、岸边的绿意和南方植物交错在一起，让人有一种从城市边缘慢慢走进海湾内部的感觉。\n\n在这里拍照，适合把镜头放得更低、更近一些。金沙湾适合拍大场面，中澳友谊花园则更适合记录小径、树影、桥的一角和人在海边停留的状态。它没有那么强的“景点压迫感”，反而因为松弛，显得很适合作为第一天下半段的过渡。\n","tags":["中澳友谊","海湾大桥","滨海公园"]},{"accent":"#ff9f0a","city":"军港码头","country":"湛江市","date":"2026-04-26","id":"zhanjiang-naval-pier","lat":21.248902,"lng":110.44384,"note":"第二天参观海军军舰的一站，也是整趟湛江行程里最有分量的记忆。","photo":"微信图片_20260505135953_1156_13.jpg","photos":[{"caption":"海军昆仑山舰","file":"微信图片_20260505135941_1149_13.jpg"},{"caption":"昆仑山舰弦号998","file":"微信图片_20260505135944_1152_13.jpg"},{"caption":"南宁舰主炮","file":"微信图片_20260505135958_1159_13.jpg"},{"caption":"南宁舰副炮","file":"微信图片_20260505135955_1157_13.jpg"},{"caption":"海军南宁舰","file":"微信图片_20260505135957_1158_13.jpg"},{"caption":"南宁舰近程防空导弹","file":"微信图片_20260505135959_1160_13.jpg"}],"story":"第二天的军港码头，是这趟湛江行程里最有分量的一站。前一天看的还是海湾、沙滩和公园，到了这里，海突然有了另一种含义：它不只是风景，也是港口、舰船和远方。站在军舰旁边时，那种尺度感会非常直接，照片很难完全还原现场看到舰体时的压迫感和震撼感。\n\n参观海军军舰的体验和普通景点很不一样。普通景点更多是“好看”，而军舰给人的感受首先是“真实”。舷号、甲板、舰体线条和各种结构都在那里，距离近到可以看清细节，但又会让人自然地保持一种敬意。它不是为了观赏而存在的物件，所以看它的时候，心情会比在海边散步时更安静一点。\n\n这一天的照片可以按“整体到细节”的顺序来放：先是舰体的整体视角，再到舷号、甲板、主炮、副炮等公开可见的局部。这样看详情页时，会有一个逐步靠近的过程，像是重新走了一遍参观路线。文字里不需要写太多技术细节，只记录当时的第一感受就足够了：巨大、坚实、克制，还有一种属于海军舰艇的秩序感。\n\n对湛江来说，这一站也让城市形象完整了很多。前一天的湛江是明亮的、热带的、适合吹海风的；第二天的湛江则显得更深、更硬朗。海湾城市的浪漫和军港城市的庄重并不矛盾，它们共同构成了这次旅行最特别的地方。\n","tags":["第二天","军港","海军军舰","舰艇参观"]}],"story":"湛江这趟行程的记忆，是从很明显的海风开始的。它不像一些只把海藏在远处的城市，湛江的海几乎是贴着日常生活展开的：道路尽头能看见水面，桥的线条横过海湾，空气里也有潮湿、明亮、带一点盐味的气息。抵达的时候，会很自然地觉得这是一座被港口、海湾和热带植物共同塑造出来的城市。\n\n第一天的节奏比较适合慢慢进入湛江。先去金沙湾观海长廊，看海湾大桥、沙滩和岸边的城市轮廓；再到中澳友谊花园，把视角从热闹的海岸转到更舒展的公园和桥景。两处都在海边，但感受并不重复：金沙湾更像城市给人的第一眼，开阔、直接、带着一点假日感；中澳友谊花园则更安静，适合停下来看看水面、树影和桥梁。\n\n第二天的军港码头是整趟行程里最特殊的一站。参观军舰时，旅行的心情会从“看风景”转向一种更庄重的凝视：舰体的尺度、甲板的线条、舷号和装备的存在感，都让人意识到港城不只是浪漫的海边城市，也和更宏大的海洋、国防与时代叙事相连。这里不适合写得太炫耀，反而越是克制，越能留下那种站在近处仰望钢铁巨舰时的震动。\n\n如果给这趟湛江行程找一个关键词，我会选“海港感”。它不是单纯的海滨度假，也不是纯粹的城市漫步，而是把海湾、桥、舰船、沙滩、公园和南方的热带气候放在一起。以后再回看这些照片时，大概会先想起那种明亮的蓝绿色，想起海风从桥下和岸边吹过来，也想起这座城市既轻松又有分量的一面。\n","tags":["海港","南海","热带"]}],"subtitle":"把抵达过的坐标、照片和时间留在同一张中国地图上。","title":"我的旅行地图"}</script><header class=travel-toolbar aria-label=旅行地图><div class=travel-title-block><h1>我的旅行地图</h1></div><div class=travel-toolbar-actions><div class=travel-stats aria-label=旅行统计><span><strong data-travel-count>0</strong> 城市</span>
