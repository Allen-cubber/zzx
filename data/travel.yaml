    photos: []
    story: ""
    spots:
      - id: "dongguan-mos9mm3o"
        city: "VIVO智慧终端总部"
        country: "东莞市"
        date: "2025-11-27"
        lat: 22.743215
        lng: 113.752336
        accent: "#ff9f0a"
        note: "一次难忘的高科技企业参观体验。"
        tags:
          - "VIVO"
          - "手机工厂"
          - "研发中心"
        photo: "微信图片_20260505144642_1163_13.jpg"
        photos:
          - file: "微信图片_20260505144640_1161_13.jpg"
            caption: "校友交流会"
          - file: "微信图片_20260505144641_1162_13.jpg"
            caption: ""
          - file: "微信图片_20260505144648_1164_13.jpg"
            caption: ""
        story: |
          学院组织我们前往东莞的vivo“超级工厂”参观。大巴驶入vivo工业园，现代感十足的建筑群让人印象深刻。活动的第一站是文化展厅。在这里，我不仅看到了vivo从创立至今的完整发展脉络，更通过讲解员，第一次真切地理解了“本分、设计驱动、用户导向”这些核心价值观背后的分量。墙上的照片和陈列的手机，像一部浓缩的科技发展史，让我对一家成功企业的内核有了新的认识。
          但最震撼的环节，无疑是走进智能制造中心。在SMT车间，高速贴片机以令人目不暇接的速度精准作业，微小的芯片和元器件被毫厘不差地放置在线路板上。而在总装线上，机械臂有条不紊地挥舞，自动化设备进行着各种检测。现场工程师告诉我们，这里绝大部分工序都已实现自动化。亲眼见证一部手机在这样一条高度智能、安静高效的产线上诞生，我对“工业4.0”和“中国智造”有了前所未有的具象化感受，科技的“硬核”实力让人叹为观止。
          最后的晚餐是在vivo的员工餐厅，这大概是最“接地气”的交流。我们和学长、HR们围坐一桌，一边享用丰富的自助餐，一边畅所欲言。从食堂的饭菜口味聊到公司的技术挑战，从行业趋势聊到个人规划，氛围轻松又热烈。这场“餐桌上的交流会”，让我仿佛提前触摸到了职场生活的质感。
          回程的路上，我还在回味这一天的所见所闻。这不仅仅是一次简单的企业参观，更像是一扇窗户，让我亲眼看到了顶尖的制造技术，感受到了优秀的企业文化，也从学长身上看到了自己未来的可能。感谢学院组织的这次活动，它为我拨开了眼前的一些迷雾，让我对所学专业的应用和个人的职业道路，有了更清晰、更坚定的想象。
  - id: "zhanjiang"
    city: "湛江市"
    country: "中国"
    date: "2026-04-25"
    lat: 21.270708
    lng: 110.359377
    accent: "#0fb9b1"
    note: "南海边的海港城市，风里有很明显的热带和海盐气息。"
    tags:
      - "海港"
      - "南海"
      - "热带"
    photo: "微信图片_20260505135957_1158_13.jpg"
    photos: []
    story: |
      湛江这趟行程的记忆，是从很明显的海风开始的。它不像一些只把海藏在远处的城市，湛江的海几乎是贴着日常生活展开的：道路尽头能看见水面，桥的线条横过海湾，空气里也有潮湿、明亮、带一点盐味的气息。抵达的时候，会很自然地觉得这是一座被港口、海湾和热带植物共同塑造出来的城市。
      
      第一天的节奏比较适合慢慢进入湛江。先去金沙湾观海长廊，看海湾大桥、沙滩和岸边的城市轮廓；再到中澳友谊花园，把视角从热闹的海岸转到更舒展的公园和桥景。两处都在海边，但感受并不重复：金沙湾更像城市给人的第一眼，开阔、直接、带着一点假日感；中澳友谊花园则更安静，适合停下来看看水面、树影和桥梁。
      
      第二天的军港码头是整趟行程里最特殊的一站。参观军舰时，旅行的心情会从“看风景”转向一种更庄重的凝视：舰体的尺度、甲板的线条、舷号和装备的存在感，都让人意识到港城不只是浪漫的海边城市，也和更宏大的海洋、国防与时代叙事相连。这里不适合写得太炫耀，反而越是克制，越能留下那种站在近处仰望钢铁巨舰时的震动。
      
      如果给这趟湛江行程找一个关键词，我会选“海港感”。它不是单纯的海滨度假，也不是纯粹的城市漫步，而是把海湾、桥、舰船、沙滩、公园和南方的热带气候放在一起。以后再回看这些照片时，大概会先想起那种明亮的蓝绿色，想起海风从桥下和岸边吹过来，也想起这座城市既轻松又有分量的一面。
    spots:
      - id: "zhanjiang-jinshawan-sea-view-corridor"
        city: "金沙湾观海长廊"
        country: "湛江市"
        date: "2026-04-25"
        lat: 21.2671
        lng: 110.390668
        accent: "#0fb9b1"
        note: "第一天的海边起点，沿着金沙湾看海、看桥，也看湛江这座港城的开阔天际线。"
        tags:
          - "观海长廊"
          - "金沙湾"
          - "海湾大桥"
        photo: "微信图片_20260505135939_1148_13.jpg"
        photos:
          - file: "微信图片_20260505135945_1153_13.jpg"
            caption: "湛江市奥体中心"
          - file: "微信图片_20260505135939_1148_13.jpg"
            caption: "湛江海湾大桥"
          - file: "微信图片_20260505135943_1151_13.jpg"
            caption: "金沙湾沙滩"
        story: |
          金沙湾观海长廊很适合作为湛江行程的开场。到了海边以后，视野一下子打开：前面是海湾，远处是湛江海湾大桥，脚下是沿岸铺开的步道和沙滩。它给人的第一印象不是某一个具体景点，而是一整片城市海岸线扑面而来。
          
          沿着长廊走的时候，可以很明显地感到湛江的城市气质：海不是背景，而是日常的一部分。有人在沙滩边散步，有人停在栏杆旁看桥，也有人只是坐在岸边吹风。金沙湾沙滩、海湾大桥和奥体中心这些画面放在一起，让这片区域既有滨海城市的开阔，也有生活场景的松弛。
          
          这里最适合慢下来，不用急着打卡到此一游。看桥的时候，桥身像一条细长的线把海湾两侧连起来；看沙滩的时候，颜色又变得柔和，海水、沙面和岸边建筑彼此过渡。照片里如果既有大桥的远景，也有沙滩和步道的近景，就能把“第一次见到湛江海边”的感觉留得比较完整。
      - id: "zhanjiang-china-australia-friendship-garden"
        city: "中澳友谊花园"
        country: "湛江市"
        date: "2026-04-25"
        lat: 21.245542
        lng: 110.406418
        accent: "#34c759"
        note: "第一天的第二站，在海湾大桥西岸一带，公园、栈道和桥景把海湾视野拉得更开。"
        tags:
          - "中澳友谊"
          - "海湾大桥"
          - "滨海公园"
        photo: "微信图片_20260505135942_1150_13.jpg"
        photos: []
        story: |
          中澳友谊花园和金沙湾离得不算远，但气质明显不一样。如果说金沙湾是城市海岸的开阔正面，那么中澳友谊花园更像海湾边一处可以停下来的缓冲地带。走进这里以后，视线会从沙滩和大桥转向园区、水面、植物和更细碎的步道。
          
          这一站的好处是节奏很松。海湾大桥仍然在视野里，但它不再只是远处的地标，而变成了公园景观的一部分。桥的线条、水面的反光、岸边的绿意和南方植物交错在一起，让人有一种从城市边缘慢慢走进海湾内部的感觉。
          
          在这里拍照，适合把镜头放得更低、更近一些。金沙湾适合拍大场面，中澳友谊花园则更适合记录小径、树影、桥的一角和人在海边停留的状态。它没有那么强的“景点压迫感”，反而因为松弛，显得很适合作为第一天下半段的过渡。
      - id: "zhanjiang-naval-pier"
        city: "军港码头"
        country: "湛江市"
        date: "2026-04-26"
        lat: 21.248902
        lng: 110.44384
        accent: "#ff9f0a"
        note: "第二天参观海军军舰的一站，也是整趟湛江行程里最有分量的记忆。"
        tags:
          - "第二天"
          - "军港"
          - "海军军舰"
          - "舰艇参观"
        photo: "微信图片_20260505135953_1156_13.jpg"
        photos:
          - file: "微信图片_20260505135941_1149_13.jpg"
            caption: "海军昆仑山舰"
          - file: "微信图片_20260505135944_1152_13.jpg"
            caption: "昆仑山舰弦号998"
          - file: "微信图片_20260505135958_1159_13.jpg"
            caption: "南宁舰主炮"
          - file: "微信图片_20260505135955_1157_13.jpg"
            caption: "南宁舰副炮"
          - file: "微信图片_20260505135957_1158_13.jpg"
            caption: "海军南宁舰"
          - file: "微信图片_20260505135959_1160_13.jpg"
            caption: "南宁舰近程防空导弹"
        story: |
          第二天的军港码头，是这趟湛江行程里最有分量的一站。前一天看的还是海湾、沙滩和公园，到了这里，海突然有了另一种含义：它不只是风景，也是港口、舰船和远方。站在军舰旁边时，那种尺度感会非常直接，照片很难完全还原现场看到舰体时的压迫感和震撼感。
          
          参观海军军舰的体验和普通景点很不一样。普通景点更多是“好看”，而军舰给人的感受首先是“真实”。舷号、甲板、舰体线条和各种结构都在那里，距离近到可以看清细节，但又会让人自然地保持一种敬意。它不是为了观赏而存在的物件，所以看它的时候，心情会比在海边散步时更安静一点。
          
          这一天的照片可以按“整体到细节”的顺序来放：先是舰体的整体视角，再到舷号、甲板、主炮、副炮等公开可见的局部。这样看详情页时，会有一个逐步靠近的过程，像是重新走了一遍参观路线。文字里不需要写太多技术细节，只记录当时的第一感受就足够了：巨大、坚实、克制，还有一种属于海军舰艇的秩序感。
          
          对湛江来说，这一站也让城市形象完整了很多。前一天的湛江是明亮的、热带的、适合吹海风的；第二天的湛江则显得更深、更硬朗。海湾城市的浪漫和军港城市的庄重并不矛盾，它们共同构成了这次旅行最特别的地方。
