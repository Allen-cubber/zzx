        story: |
          成都都江堰位于四川省成都市都江堰市，是战国时期秦国蜀郡太守李冰率众修建的伟大水利工程。它由鱼嘴、飞沙堰和宝瓶口三大主体工程组成，巧妙地利用自然地形和水力学原理，实现了“引水灌溉，分洪减灾”的功能，使成都平原成为“天府之国”。作为当今世界上年代最久、唯一留存且仍在使用的无坝引水工程，它被列为世界文化遗产，象征着古代中国人民卓越的智慧与治水文明。
