        story: |
          成都大熊猫繁育研究基地位于成都市北郊，是全球知名的大熊猫迁地保护基地和科研教育中心。这里模拟了大熊猫野外生存的自然环境，不仅是近距离观察大熊猫及其幼仔、小熊猫等珍稀动物的绝佳场所，更通过尖端的生物技术致力于大熊猫的繁育与保护，让更多人能领略到这些“国宝”的魅力。
