      - id: "city-mor6y2lq-mosm7pp0"
        city: "二七纪念塔"
        country: "郑州市"
        date: "2025-07-13"
        lat: 34.753335
        lng: 113.6604
        accent: "#eb0000"
        note: "1923 年京汉铁路工人大罢工及“二七惨案”是中共党史和中国工人运动史上的标志性事件。"
        tags:
          - "纪念塔"
          - "历史"
        photo: "微信图片_20260505203721_1260_13.jpg"
        photos:
          - file: "微信图片_20260505203721_1265_13.jpg"
            caption: "二七纪念塔特写"
          - file: "微信图片_20260505204114_1267_13.jpg"
            caption: "二七广场"
        story: |
          1923 年 2 月，京汉铁路总工会成立大会遭军阀吴佩孚武力阻挠，工人为争自由、人权而罢工。工人在郑州强行召开成立大会，会所被军警捣毁。3万工人参与，1200公里铁路瘫痪。吴佩孚下令军警开枪，造成大量伤亡，林祥谦、施洋等工人领袖牺牲。这是中共领导的第一次工运高潮的顶峰。虽失败，但暴露了军阀本质，推动了国共合作和北伐战争。郑州“二七纪念塔”新塔于1971年建成，以纪念“二七惨案”。
