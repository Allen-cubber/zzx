        story: |
          成都青城山位于四川省都江堰市，是中国四大道教名山之一，自古以来便以“青城天下幽”的美誉闻名遐迩。作为世界文化遗产，它不仅是道教的发祥地之一，拥有建福宫、天师洞等古迹，更因其终年青翠的山色、清幽的溪谷和深厚的文化底蕴，成为了将自然景观与宗教文化完美结合的避暑与康养胜地。
