        story: |
          天府广场位于成都市中心，是这座城市的地理标志与核心地标，也是西南地区最大的城市广场。它集政治、文化和商业功能于一体，周边环绕着四川科技馆、成都博物馆等重要建筑，地面标志性的太极八卦图设计展现了现代都市与传统文化的交融，被誉为成都的“城市会客厅”。
