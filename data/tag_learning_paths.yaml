# 标签学习路径手写配置（可选）
# 说明：
# 1) 顶层 key 是标签名，需与站内标签完全一致。
# 2) intro / advanced / practice 里的每一项是文章路径（推荐用 RelPermalink）。
# 3) 顺序即展示顺序；未写入的文章会由模板自动分类补全。
# 4) 路径写法示例：/notes/数字信号处理/1.概述/

